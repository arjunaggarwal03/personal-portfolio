name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint

  accessibility:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build
      # Lighthouse CI builds, boots `next start`, and asserts a perfect
      # accessibility score (config in .lighthouserc.json). It uses the same
      # axe-core engine the site is audited with, so the WCAG 2.2 AA conformance
      # claim on /accessibility stays enforced on every push and PR.
      - name: Run accessibility audit (Lighthouse CI)
        run: npx --yes @lhci/cli@0.14.0 autorun
