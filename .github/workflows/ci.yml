name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref so quick successive pushes don't pile up.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      # Oxlint (Next.js + jsx-a11y + react + import rules) gates correctness.
      - run: npm run lint
      # Biome verifies formatting is consistent (fails on unformatted files).
      - run: npm run format:check

  accessibility:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      # Persist Next's webpack cache so incremental builds finish in ~60-90s
      # instead of a ~4min cold build.
      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**/*.[jt]s', '**/*.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-
      # Cache the Playwright-managed Chromium so it isn't re-downloaded each run.
      - name: Cache Playwright browser
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - run: npm run build
      # axe-core's full WCAG 2.2 ruleset, driven by Playwright, asserts zero
      # accessibility violations on every key route. It's faster and stricter
      # than the Lighthouse axe subset, and keeps the "substantially conformant"
      # claim on /accessibility honest on every push and PR.
      - name: Run accessibility audit (axe-core + Playwright)
        run: npm run test:a11y
